<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plan je proefles — Bodywork by Bas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:       #028090;
    --teal2:      #00A896;
    --teal-light: #E0F4F6;
    --dark:       #0D1F26;
    --dark2:      #1A2E35;
    --white:      #FFFFFF;
    --muted:      rgba(255,255,255,0.55);
    --radius:     16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% -10%, rgba(2,128,144,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(0,168,150,0.15) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 1;
    padding: 28px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    animation: fadeDown 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  .studio-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(2,128,144,0.18);
    border: 1px solid rgba(0,168,150,0.35);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--teal2);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .studio-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal2);
    animation: pulse 2s ease-in-out infinite;
  }

  .studio-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 7vw, 40px);
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 10px;
  }

  .studio-name span {
    color: var(--teal2);
  }

  .tagline {
    font-size: clamp(14px, 3.5vw, 16px);
    font-weight: 300;
    color: var(--muted);
    line-height: 1.5;
    max-width: 340px;
    margin-bottom: 24px;
  }

  /* ── Pill row ── */
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.80);
    white-space: nowrap;
  }

  .pill svg {
    width: 14px; height: 14px;
    fill: var(--teal2);
    flex-shrink: 0;
  }

  /* ── Divider ── */
  .divider {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    margin-bottom: 6px;
    animation: fadeUp 0.8s 0.2s cubic-bezier(.22,1,.36,1) both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.10);
  }

  .divider-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.30);
  }

  /* ── Widget wrapper ── */
  .widget-wrap {
    position: relative;
    z-index: 1;
    flex: 1;
    padding: 12px 16px 24px;
    animation: fadeUp 0.9s 0.3s cubic-bezier(.22,1,.36,1) both;
  }

  .widget-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .widget-card iframe {
    display: block;
    width: 100%;
    height: 640px;
    border: none;
    border-radius: var(--radius);
  }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 12px 24px 28px;
    font-size: 12px;
    color: rgba(255,255,255,0.22);
    line-height: 1.6;
  }

  footer a {
    color: var(--teal2);
    text-decoration: none;
    opacity: 0.7;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── Responsive ── */
  @media (min-width: 600px) {
    header { padding: 36px 40px 0; }
    .widget-wrap { padding: 16px 40px 32px; max-width: 760px; margin: 0 auto; width: 100%; }
    .widget-card iframe { height: 700px; }
    footer { padding: 12px 40px 36px; }
  }

  @media (min-width: 900px) {
    body { align-items: center; }
    header, .divider, footer { width: 100%; max-width: 760px; }
    .divider { padding: 0 40px; }
  }
</style>
</head>

<body>

<header>
  <div class="studio-badge">
    <span class="dot"></span>
    EMS Studio
  </div>

  <h1 class="studio-name">Bodywork <span>by Bas</span></h1>

  <p class="tagline">Plan je gratis proefles — kies een moment dat past en je bent direct geboekt.</p>

  <div class="pills">
    <span class="pill">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
      20 minuten
    </span>
    <span class="pill">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      EMS training
    </span>
    <span class="pill">
      <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      Gratis &amp; vrijblijvend
    </span>
  </div>
</header>

<div class="divider">
  <div class="divider-line"></div>
  <span class="divider-label">Kies je moment</span>
  <div class="divider-line"></div>
</div>

<div class="widget-wrap">
  <div class="widget-card">
    <iframe
      src="https://bodywork-by-bas.trainin.app/widget/schedule?listing=LOO6KW"
      title="Proefles boeken bij Bodywork by Bas"
      loading="lazy"
    ></iframe>
  </div>
</div>

<footer>
  Vragen? Stuur een bericht via WhatsApp.<br>
  <a href="https://bodywork-by-bas.trainin.app" target="_blank" rel="noopener">bodywork-by-bas.trainin.app</a>
</footer>

</body>
</html>
